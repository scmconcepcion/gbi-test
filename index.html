<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBI | Global Innovation Inc.</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">

    <!-- LOGO + COMPANY NAME -->
    <a href="index.html" class="logo-wrap">
      <img src="images/logo.png" alt="GBI Logo">
      <div class="company-text">
        <span class="company-small-header">株式会社</span>
        <span class="company-name-header">グローバルイノベーション</span>
      </div>
    </a>

    <!-- NAV -->
    <nav class="nav">
      <a href="index.html">ホーム</a>
      <a href="#">代表挨拶</a>
      <a href="#">事業内容</a>
      <a href="#">社員の声</a>
      <a href="#">採用情報</a>
      <a href="#">会社概要</a>
      <a href="#contact">お問い合わせ</a>
    </nav>

    <!-- PHONE -->
    <div class="phone">
      <i class="fas fa-phone"></i> 098-917-5572
    </div>

  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">

    <!-- LEFT: TEXT -->
    <div class="hero-text">
      <h1 class="hero-title">
        ITで未来を創る企業
      </h1>

      <p class="tagline">
        システム開発・ネットワーク構築・DX支援で<br>
        ビジネスの成長をサポートします。
      </p>

      <a href="#contact" class="btn-primary">お問い合わせ</a>
    </div>

    <!-- RIGHT: IMAGE -->
    <div class="hero-img">
      <img src="images/top_gbi.png" alt="GBI team">
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <div class="contact-inner">
    <h2>お問い合わせ</h2>

    <form>
      <input type="text" placeholder="会社名">
      <input type="email" placeholder="メール">
      <textarea placeholder="内容"></textarea>
      <button type="submit">送信</button>
    </form>
  </div>
</section>

</div><!-- /#footerMenu -->
		<div class="copyright">Copyright &#169; 2026 株式会社グローバルイノベーションAll Rights Reserved.</div><!-- /.copyright -->
	</div><!-- /#footer -->

</body>
</html>
